<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Gelato - Calculadora</title>
  <link rel="stylesheet" href="./style_sabores/ninho_nutella.css">
  <script type="module" src="../js_sabores/ninho_nutella.js" defer></script>
</head>
<body>

  <!-- ===== nav ===== -->
  <header class="nav">
    <nav class="nav-links">
      <a href="index.html">HOME</a>
      <a href="contato.html">CONTATO</a>
    </nav>
    <div class="nav-icon">Ninho com Nutella</div>
  </header>

  <!-- ===== FORMULÁRIO ===== -->
  <section class="formulario">

    <div class="formulario_perguntas">
      <label class="formulario_pergunta">Tamanho</label>
      <select id="tamanho" class="formulario_resposta">
        <option value="400">400g (Pequeno)</option>
        <option value="900">900g (Médio)</option>
        <option value="1700">1700g (Grande)</option>
      </select>
    </div>
  
    <div class="formulario_perguntas">
      <label class="formulario_pergunta">Toneladas</label>
      <select id="toneladas" class="formulario_resposta">
        <option value="1">1 Tonelada</option>
        <option value="5">5 Toneladas</option>
        <option value="12">12 Toneladas</option>
      </select>
    </div>
  
    <div class="formulario_perguntas">
      <label class="formulario_pergunta">Raio</label>
      <input type="number" id="raio" class="formulario_resposta">
    </div>
  
    <div class="formulario_perguntas">
      <label class="formulario_pergunta">Altura</label>
      <input type="number" id="altura" class="formulario_resposta">
    </div>
  
    <div class="botao_calcular">
      <button id="botao_calcular" class="calc-btn">
        Calcular
      </button>
      <button id="botao_limpar" class="limpar_btn">
        Limpar
      </button>
    </div>
  
  </section>

  <!-- ===== TABELA ===== -->
   
  <section id="tabela_resultado">

  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>By Gabriela Mezzadri Rankel</p>
  </footer>

</body>
